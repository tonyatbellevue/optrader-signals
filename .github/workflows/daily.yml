name: daily-signals

# 每个美股交易日开市后 30 分钟跑 = 10:00 ET = 22:00 SGT
# GitHub cron 是固定 UTC、不随 DST 变, 所以挂两个时间, 再用时区门控只放行真正的 10:00 ET:
#   14:00 UTC -> 夏令时(EDT)= 10:00 ET ✅ / 冬令时(EST)= 09:00 ET ✗ 跳过
#   15:00 UTC -> 夏令时(EDT)= 11:00 ET ✗ 跳过 / 冬令时(EST)= 10:00 ET ✅
# 手动 workflow_dispatch 不受门控限制, 永远执行。
on:
  schedule:
    - cron: "0 14 * * 1-5"
    - cron: "0 15 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write              # 允许把生成结果 commit 回仓库

jobs:
  # 门控: 仅当美东当前为 10 点(开市后 30min)时放行; 手动触发永远放行
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "手动触发, 放行"; echo "run=true" >> "$GITHUB_OUTPUT"
          else
            ET_HOUR=$(TZ=America/New_York date +%H)
            echo "美东当前小时 = $ET_HOUR"
            if [ "$ET_HOUR" = "10" ]; then
              echo "= 10:00 ET, 放行"; echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "非 10:00 ET, 跳过(DST 门控)"; echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate signals
        run: python optrader_signals.py

      - name: Commit updated dashboard + IV history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html signals.json data/iv_history.json
          git commit -m "signals: $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
