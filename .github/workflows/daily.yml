name: daily-signals

# 每个美股交易日开市后 30 分钟跑
#   10:00 ET (开市 09:30 + 30min) = 14:00 UTC (夏令时 EDT) = 22:00 SGT
#   注意: GitHub cron 是固定 UTC, 不随 DST 变。冬令时(EST, 11月初~3月)时
#         14:00 UTC = 09:00 ET (开市前), 需把下面改成 "0 15 * * 1-5"。
on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch: {}        # 也可手动触发

permissions:
  contents: write              # 允许把生成结果 commit 回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate signals
        run: python optrader_signals.py

      - name: Commit updated dashboard + IV history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html signals.json data/iv_history.json
          git commit -m "signals: $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
